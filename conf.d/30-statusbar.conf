# ~/.tmux/conf.d/30-statusbar.conf - Status bar (split from theme)
set -g status 2
set -g status-position bottom
set -g status-style 'bg=#1a1b26 fg=#a9b1d6'

# Line 1: Clickable session tabs + "+" button
# Two-pass rendering: opencode pinned first (purple), then remaining sessions (blue)
# Zero shell forks — pure tmux format, instant rendering
set -g status-format[1] '#[align=left,bg=#16161e]#{S:#{?#{==:#{session_name},opencode},#[range=session|#{session_id}]#{?#{==:#{session_name},#{client_session}},#[fg=#1a1b26 bg=#bb9af7 bold] #{session_name} ,#[fg=#bb9af7 bg=#24283b] #{session_name} }#[norange bg=#16161e nobold]#[fg=#565f89]│,}}#{S:#{?#{==:#{session_name},opencode},,#[range=session|#{session_id}]#{?#{==:#{session_name},#{client_session}},#[fg=#1a1b26 bg=#3d59a1 bold] #{session_name} ,#[fg=#a9b1d6 bg=#1a1b26] #{session_name} }#[norange bg=#16161e nobold]}}#[fg=#3b4261]│#[range=user|new-session fg=#7aa2f7 bg=#24283b] + #[norange bg=#16161e]'

# Window Tabs (static — not affected by responsive tiers)
setw -g window-status-separator '#[fg=#1a1b26]|'

# Defaults removed — tmux-responsive is the sole source of truth.
# On headless start (no client), responsive falls back to Normal tier.

# ── Responsive statusbar (hook-based, no jitter) ──
# Runs only on actual resize events, not every status-interval
# Use -g (set, not append) to prevent hook accumulation on reload
set-hook -g client-resized 'run-shell -b "~/.tmux/bin/tmux-responsive"'
set-hook -g client-attached 'run-shell -b "~/.tmux/bin/tmux-responsive"'
set-hook -g client-session-changed 'run-shell -b "~/.tmux/bin/tmux-session-branch-log"'
run-shell -b "~/.tmux/bin/tmux-responsive"
