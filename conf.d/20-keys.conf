# ~/.tmux/conf.d/20-keys.conf - Keybindings

# ── Prefix ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Window Switching (F1-F5, no prefix needed) ──
bind -n F1 select-window -t 1
bind -n F2 select-window -t 2
bind -n F3 select-window -t 3
bind -n F4 select-window -t 4
bind -n F5 select-window -t 5

# ── Splits (intuitive) ──
unbind '"'
unbind %
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# ── New Window (current path) ──
bind c new-window -c '#{pane_current_path}'

# ── Pane Navigation (Alt+Left/Right, no prefix) ──
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R

# ── Session Switching (PgUp/PgDn cycle) ──
bind -n PPage  run-shell -b '~/.tmux/bin/tmux-session-cycle prev "#{client_name}" "#{session_name}"'
bind -n NPage  run-shell -b '~/.tmux/bin/tmux-session-cycle next "#{client_name}" "#{session_name}"'

# ── Opencode Session (Home key, no prefix) ──
bind -n Home run-shell '~/.tmux/bin/tmux-opencode'

# ── Session Management ──
bind L switch-client -l    # last session toggle
bind f display-popup -E -w 95% -h 90% '~/.tmux/bin/tmux-sessionizer-tui'
bind + display-popup -E -w 95% -h 90% '~/.tmux/bin/tmux-sessionizer-tui'
bind X run-shell '~/.tmux/bin/tmux-session-kill'
bind B run-shell '~/.tmux/bin/tmux-session-export'
bind D display-popup -E -w 90% -h 80% '~/.tmux/bin/tmux-session-dashboard'
bind ? display-popup -E -w 80% -h 85% '~/.tmux/bin/tmux-cheatsheet'

# ── Status Bar Click: session tabs + "+" button ──
# MouseDown handles all status line clicks:
#   range=user|new-session  → open sessionizer popup
#   range=session|X         → switch to clicked session
#   range=window|X (default)→ select clicked window
bind -n MouseDown1Status if -F '#{==:#{mouse_status_range},new-session}' \
    'display-popup -E -w 95% -h 90% "~/.tmux/bin/tmux-sessionizer-tui"' \
    'if -F "#{==:#{mouse_status_range},session}" "switch-client -t =" "select-window -t ="'

# ── Reload Config ──
bind r run-shell '~/.tmux/bin/tmux-config-reload'

# ── Session Save/Restore (manual) ──
bind S run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh' \; display 'Session saved'
bind R run-shell '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh' \; display 'Session restored'

# ── Copy Mode (vi-style) ──
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Pane Navigation (Alt+arrows, no prefix) ──
# Alt+Left/Right already defined above
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ── Session Switching (Alt+PgUp/PgDn, additional axis) ──
bind -n M-PPage run-shell -b '~/.tmux/bin/tmux-session-cycle prev "#{client_name}" "#{session_name}"'
bind -n M-NPage run-shell -b '~/.tmux/bin/tmux-session-cycle next "#{client_name}" "#{session_name}"'

# ── Scratch Popup (prefix + backtick) ──
bind ` display-popup -E -h 75% -w 75% -d '#{pane_current_path}'

# ── Copy/Search Shortcuts ──
bind / copy-mode \; send-keys /
bind = choose-buffer

# ── Pane/Layout ──
# Built-in: prefix+{ swap-pane up, prefix+} swap-pane down
# Built-in: prefix+o rotate panes, prefix+; last-pane toggle
bind M join-pane
bind C-Space next-layout

# ── Wave 2 (tmux-33 improvements) ──
bind Space display-popup -E -w 60% -h 50% '~/.tmux/bin/tmux-session-jump'
bind n display-popup -E -w 60% -h 50% '~/.tmux/bin/tmux-template-create'
bind u display-popup -E -w 80% -h 60% '~/.tmux/bin/tmux-url-open'
bind e display-popup -E -w 80% -h 60% '~/.tmux/bin/tmux-file-open'
bind P display-popup -E -w 70% -h 70% '~/.tmux/bin/tmux-command-palette'
bind s display-popup -E -w 60% -h 50% '~/.tmux/bin/tmux-ssh-picker'
bind p display-popup -E -w 70% -h 60% '~/.tmux/bin/tmux-clipboard-history'
bind y run-shell '~/.tmux/bin/tmux-copy-word'
bind Y run-shell '~/.tmux/bin/tmux-pane-sync'
