# Slack notification hooks
# Fires tmux-slack-notify on session lifecycle events
# Requires: bin/tmux-slack-notify, slack bridge running on TMUX_SLACK_NOTIFY_PORT (default 9876)
# Note: session-renamed hook only receives the new name (tmux limitation — no old name available)

set-hook -g session-created   'run-shell -b "~/.tmux/bin/tmux-slack-notify session-created  \"#{session_name}\""'
set-hook -g session-closed    'run-shell -b "~/.tmux/bin/tmux-slack-notify session-closed   \"#{session_name}\""'
set-hook -g session-renamed   'run-shell -b "~/.tmux/bin/tmux-slack-notify session-renamed  \"#{session_name}\""'
set-hook -g client-attached   'run-shell -b "~/.tmux/bin/tmux-slack-notify client-attached  \"#{session_name}\""'
set-hook -g client-detached   'run-shell -b "~/.tmux/bin/tmux-slack-notify client-detached  \"#{session_name}\""'
